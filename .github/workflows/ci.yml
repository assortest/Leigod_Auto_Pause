name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-test-publish:
    runs-on: windows-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore src/Leigod_Auto_Pause.sln -v minimal

      - name: Build
        run: dotnet build src/Leigod_Auto_Pause.sln -c Release --no-restore -v minimal

      - name: Test
        run: dotnet test tests/Leigod_Auto_Pause.Tests/Leigod_Auto_Pause.Tests.csproj -c Release --no-build -v minimal

      - name: Publish
        run: dotnet publish src/Leigod_Auto_Pause/Leigod_Auto_Pause.csproj -c Release /p:PublishProfile=ReleaseSingleFile -o artifacts/publish/single-file --no-build -v minimal

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: Leigod_Auto_Pause-win-x64-single-file
          path: artifacts/publish/single-file
          if-no-files-found: error
